<!DOCTYPE html>
<html>
<head>
    <title>3 Tier Application</title>
</head>

<body>

<h1>3 Tier Application</h1>

<button onclick="loadData()">Get Users From Database by uday reddy</button>

<div id="result"></div>

<script>
async function loadData() {
    try {
        const response = await fetch("http://13.51.200.23:3000/users");

        const users = await response.json();

        let output = "";

        users.forEach(user => {
            output += "<p>" + user.id + " - " + user.name + " - " + user.email + "</p>";
        });

        document.getElementById("result").innerHTML = output;

    } catch (error) {
        document.getElementById("result").innerHTML = error;
    }
}
</script>

</body>
</html>
